<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Battle Arena — DAP World</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://play.pokemonshowdown.com">
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <img src="https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png" class="header-icon" alt="">
      <h1>Pokemon Battle Arena</h1>
    </div>
    <div class="header-right">
      <span id="status-badge" class="badge offline">OFFLINE</span>
      <span id="battle-id" class="meta"></span>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar">
      <div class="panel" id="rules-panel">
        <div class="panel-header">WORLD RULES</div>
        <div class="panel-body" id="manifest-content">
          <p class="dim">Connecting...</p>
        </div>
      </div>
      <div class="panel" id="team-panel">
        <div class="panel-header">YOUR TEAM</div>
        <div class="panel-body" id="team-list"></div>
      </div>
    </aside>

    <main id="battle-main">
      <!-- Opponent Pokemon -->
      <div class="pokemon-bar opponent-bar">
        <div class="bar-info">
          <span class="poke-name" id="opp-name">???</span>
          <span class="poke-status" id="opp-status"></span>
        </div>
        <div class="hp-track"><div class="hp-fill" id="opp-hp"></div></div>
        <div class="hp-label" id="opp-hp-text"></div>
      </div>

      <!-- Battle Scene -->
      <div id="battle-scene">
        <div class="battlefield">
          <div class="ground-opp"></div>
          <div class="ground-player"></div>
        </div>
        <div id="sprite-opp" class="sprite-slot opp-slot">
          <img id="opp-sprite" src="" alt="" class="pokemon-sprite">
        </div>
        <div id="sprite-player" class="sprite-slot player-slot">
          <img id="player-sprite" src="" alt="" class="pokemon-sprite back-sprite">
        </div>
        <div id="turn-indicator">Turn <span id="turn-num">0</span></div>
        <div id="battle-overlay" class="hidden">
          <span id="overlay-text"></span>
        </div>
      </div>

      <!-- Player Pokemon -->
      <div class="pokemon-bar player-bar">
        <div class="bar-info">
          <span class="poke-name" id="player-name">???</span>
          <span class="poke-status" id="player-status"></span>
        </div>
        <div class="hp-track"><div class="hp-fill" id="player-hp"></div></div>
        <div class="hp-label" id="player-hp-text"></div>
      </div>

      <!-- Action Panel -->
      <div id="action-panel">
        <div id="action-prompt">Choose a move or switch Pokemon.</div>
        <div id="moves-grid">
          <button class="move-btn" data-slot="1" disabled></button>
          <button class="move-btn" data-slot="2" disabled></button>
          <button class="move-btn" data-slot="3" disabled></button>
          <button class="move-btn" data-slot="4" disabled></button>
        </div>
        <div id="switch-row"></div>
        <div id="controls">
          <button id="new-battle-btn" class="ctrl-btn">New Battle</button>
        </div>
      </div>
    </main>

    <aside id="log-sidebar">
      <div class="panel">
        <div class="panel-header">BATTLE LOG</div>
        <div class="panel-body" id="battle-log"></div>
      </div>
    </aside>
  </div>
</div>
<script src="/client.js"></script>
</body>
</html>
